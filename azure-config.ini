# Azure App Service Configuration
# For MSA Article Stock Analysis Streamlit App

# This file contains settings for Azure App Service deployment

[default]
# Resource Group
resource_group = article-wise-rg

# App Service Plan
app_service_plan = article-wise-plan
sku = B2  # B2 tier minimum recommended for Streamlit
linux = true

# App Service
app_name = article-wise-app
runtime_version = PYTHON|3.11

[deployment]
# GitHub integration
repository = Sujeet597/article_wise
branch = main

[environment_variables]
# Streamlit Configuration
STREAMLIT_SERVER_PORT = 8000
STREAMLIT_SERVER_ADDRESS = 0.0.0.0
STREAMLIT_SERVER_HEADLESS = true
STREAMLIT_CLIENT_TOOLBAR_MODE = minimal
STREAMLIT_LOGGER_LEVEL = info

# Python Configuration
PYTHONUNBUFFERED = 1

# Azure Configuration
WEBSITES_PORT = 8000
SCM_DO_BUILD_DURING_DEPLOYMENT = true
ENABLE_ORYX_BUILD = true

[startup]
# Startup script
command = bash startup.sh

[performance]
# Always On setting (recommended for production)
always_on = true

# Instance count
instance_count = 1

# Auto-scale settings (optional)
# min_instances = 1
# max_instances = 3
# cpu_threshold = 70

[limits]
# File upload size limit (200MB)
max_upload_size = 209715200

# Timeout settings (in seconds)
request_timeout = 600

[security]
# HTTPS only
https_only = true

# CORS settings
cors_allowed_origins = *

# IP restrictions (optional)
# ip_restrictions = []

[monitoring]
# Application Insights
enable_app_insights = true

# Logging
log_level = INFO
