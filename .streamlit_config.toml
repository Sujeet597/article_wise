[theme]
primaryColor = "#0066CC"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F5F5F5"
textColor = "#262730"
font = "sans serif"

[server]
port = 8501
maxUploadSize = 200
enableCORS = true
headless = false

[client]
maxMessageSize = 200
showErrorDetails = true
toolbarMode = "minimal"

[logger]
level = "info"
